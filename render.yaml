services:
  # 1. Backend API Service (Free Web Service)
  - type: web
    name: supoclip-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supoclip-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: supoclip-redis
          property: host
      - key: ASSEMBLY_AI_API_KEY
        sync: false 
      - key: LLM
        value: "google-gla:gemini-3-flash-preview"
      - key: GOOGLE_API_KEY
        sync: false

  # 2. Background Worker (Hacked as a Free Web Service)
  - type: web
    name: supoclip-worker
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    # Overrides FastAPI to run the worker instead
    command: python -m arq worker.WorkerSettings
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supoclip-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: supoclip-redis
          property: host
      - key: ASSEMBLY_AI_API_KEY
        sync: false
      - key: LLM
        value: "google-gla:gemini-3-flash-preview"
      - key: GOOGLE_API_KEY
        sync: false

  # 3. Frontend Service (Free Web Service)
  - type: web
    name: supoclip-frontend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: supoclip-backend
          property: srv
      - key: BETTER_AUTH_SECRET
        generateValue: true

databases:
  # Free Postgres (Warning: Deletes in 30 days)
  - name: supoclip-postgres
    databaseName: supoclip
    user: supoclip
    plan: free

redis:
  # Free Redis (25MB limit)
  - name: supoclip-redis
    plan: free
